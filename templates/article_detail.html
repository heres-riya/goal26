{% extends "base.html" %}

{% block title %}{{ article.title }}{% endblock %}

{% block content %}
<div style="max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.12);">
    <a href="{{ url_for('index') }}" style="display:inline-block; margin-bottom: 20px; color:#667eea; text-decoration:none; font-weight:700;">← Back to home</a>
    <h1 style="font-size: 2.5rem; margin-bottom: 18px;">{{ article.title }}</h1>
    <div style="color:#777; margin-bottom: 24px;">Published on {{ article.created_at.strftime('%b %d, %Y') if article.created_at else 'Unknown date' }}</div>
    <div class="article-body" style="color:#333; line-height:1.9;">
        {{ article_body_html }}
    </div>
</div>
{% endblock %}
